<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akhanet Business Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }
        :root { --primary: #1E7C98; --primary-hover: #165c71; --light-bg: #e6f3f7; }

        /* LOGIN SCREEN */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-box h2 { color: var(--primary); margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .login-box button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .login-box button:hover { background: var(--primary-hover); }
        .error-msg { color: #d32f2f; margin-bottom: 15px; font-size: 0.9rem; display: none; }

        /* DASHBOARD LAYOUT */
        #dashboardScreen { display: none; width: 100%; height: 100%; }
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-size: 0.9rem; font-weight: 500; }
        .logout-btn { background: transparent; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        
        .customer-list { flex: 1; overflow-y: auto; }
        .customer-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .customer-item:hover { background: #f9f9f9; }
        .customer-item.active { background: var(--light-bg); border-left: 4px solid var(--primary); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.open { background-color: #4CAF50; } /* Green for available */
        .status-dot.assigned { background-color: #FFC107; } /* Yellow for claimed */
        .status-badge { font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; background: #eee; color: #555; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .chat-header { background: #f0f2f5; padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between;}
        .chat-title { font-weight: bold; font-size: 1.1rem; color: #333; }
        .action-btn { padding: 8px 16px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; }
        .claim-btn { background: #4CAF50; }
        .close-btn { background: #d32f2f; }
        
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 8px; max-width: 75%; line-height: 1.4; font-size: 0.95rem; position: relative; }
        .msg.incoming { background: white; align-self: flex-start; border-top-left-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.outgoing { background: var(--light-bg); align-self: flex-end; border-top-right-radius: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg img { max-width: 100%; max-height: 350px; object-fit: contain; display: block; border-radius: 6px; margin-top: 5px; }
        
        .input-area { padding: 15px 20px; background: #f0f2f5; display: flex; gap: 10px; align-items: center; }
        .input-area input[type="text"] { flex: 1; padding: 14px; border: none; border-radius: 24px; outline: none; font-size: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .send-btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 24px; cursor: pointer; font-weight: bold; }
        .attach-btn { background: #fff; color: #555; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border: none; padding: 12px; border-radius: 24px; cursor: pointer;}
        
        #lockOverlay { display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10; align-items: center; justify-content: center; font-size: 1.2rem; color: #555; font-weight: bold; text-align: center; padding: 20px; }

        @media (max-width: 768px) {
            #dashboardScreen { flex-direction: column; }
            .sidebar { width: 100%; height: 40%; border-right: none; border-bottom: 2px solid #ddd; }
            .chat-area { height: 60%; position: relative; }
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>Akhanet Portal</h2>
            <div id="loginError" class="error-msg">Incorrect username or passcode.</div>
            <input type="text" id="username" placeholder="Username (e.g. staff_mary)">
            <input type="password" id="passcode" placeholder="Passcode">
            <button onclick="attemptLogin()">Log In to Workspace</button>
        </div>
    </div>

    <div id="dashboardScreen">
        <div class="sidebar">
            <div class="header">
                <div>
                    <div style="font-weight: bold; font-size: 1.1rem;">Active Lobby</div>
                    <div id="loggedInUser" class="user-info"></div>
                </div>
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
            <div class="customer-list" id="lobbyList">
                </div>
        </div>

        <div class="chat-area" style="position: relative;">
            <div id="lockOverlay">Select a customer from the lobby to view chat.</div>
            
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-title" id="activeChatTitle">Chat</div>
                <div id="chatControls">
                    </div>
            </div>
            
            <div class="messages" id="chatBox"></div>
            
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="file" id="fileInput" style="display: none;">
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎 Attach</button>
                <input type="text" id="msgInput" placeholder="Type a message or caption...">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentStaff = '';
        let activePhone = '';
        let activeCustomerStatus = '';
        let activeCustomerOwner = '';

        // LOGIN
        async function attemptLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('passcode').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, passcode: pass })
                });
                const data = await res.json();
                if (data.success) {
                    currentStaff = data.username;
                    document.getElementById('loggedInUser').innerText = `Agent: ${currentStaff}`;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboardScreen').style.display = 'flex';
                    loadLobby();
                } else { document.getElementById('loginError').style.display = 'block'; }
            } catch (err) { alert("Server error."); }
        }

        function logout() { location.reload(); }

        // LOAD LOBBY
        async function loadLobby() {
            if(!currentStaff) return;
            try {
                const res = await fetch('/api/customers');
                const customers = await res.json();
                const list = document.getElementById('lobbyList');
                list.innerHTML = '';

                customers.forEach(cust => {
                    // Don't show closed chats in the main lobby
                    if(cust.status === 'closed') return; 

                    const div = document.createElement('div');
                    div.className = `customer-item ${cust.phone_number === activePhone ? 'active' : ''}`;
                    
                    let statusHtml = '';
                    if (cust.status === 'open') {
                        statusHtml = `<span class="status-badge"><span class="status-dot open"></span>Waiting</span>`;
                    } else if (cust.status === 'assigned') {
                        const isMe = cust.assigned_to === currentStaff;
                        statusHtml = `<span class="status-badge"><span class="status-dot assigned"></span>${isMe ? 'My Chat' : cust.assigned_to}</span>`;
                    }

                    div.innerHTML = `<div><strong>${cust.phone_number}</strong></div> ${statusHtml}`;
                    div.onclick = () => selectCustomer(cust.phone_number, cust.status, cust.assigned_to);
                    list.appendChild(div);
                });
            } catch (err) { console.error(err); }
        }

        // SELECT CUSTOMER
        function selectCustomer(phone, status, owner) {
            activePhone = phone;
            activeCustomerStatus = status;
            activeCustomerOwner = owner;
            
            document.getElementById('lockOverlay').style.display = 'none';
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('activeChatTitle').innerText = phone;
            
            updateChatControls();
            loadMessages();
            loadLobby(); // Refresh list to show active highlight
        }

        // UPDATE BUTTONS & LOCKS
        function updateChatControls() {
            const controls = document.getElementById('chatControls');
            const inputArea = document.getElementById('inputArea');
            const overlay = document.getElementById('lockOverlay');

            if (activeCustomerStatus === 'open') {
                controls.innerHTML = `<button class="action-btn claim-btn" onclick="updateCustomerStatus('assigned', '${currentStaff}')">✋ Attend to Customer</button>`;
                inputArea.style.display = 'none'; // Must claim before typing
            } else if (activeCustomerStatus === 'assigned' && activeCustomerOwner === currentStaff) {
                controls.innerHTML = `<button class="action-btn close-btn" onclick="updateCustomerStatus('closed', '${currentStaff}')">✅ Mark Job Complete</button>`;
                inputArea.style.display = 'flex'; // Unlocked for the owner
            } else if (activeCustomerStatus === 'assigned' && activeCustomerOwner !== currentStaff) {
                controls.innerHTML = `<span style="color: #666; font-size: 0.9rem;">🔒 Handled by ${activeCustomerOwner}</span>`;
                inputArea.style.display = 'none'; // Locked out for other staff
            }
        }

        // CLAIM OR CLOSE CHAT
        async function updateCustomerStatus(newStatus, assignedTo) {
            await fetch('/api/customers/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: activePhone, status: newStatus, assigned_to: assignedTo })
            });
            activeCustomerStatus = newStatus;
            activeCustomerOwner = assignedTo;
            
            if (newStatus === 'closed') {
                activePhone = ''; // Clear screen if closed
                document.getElementById('lockOverlay').style.display = 'flex';
                document.getElementById('lockOverlay').innerText = "Job logged for payroll. Select another customer.";
                document.getElementById('chatHeader').style.display = 'none';
                document.getElementById('inputArea').style.display = 'none';
                document.getElementById('chatBox').innerHTML = '';
            } else {
                updateChatControls();
            }
            loadLobby();
        }

        // LOAD MESSAGES
        async function loadMessages() {
            if(!activePhone) return;
            try {
                const res = await fetch(`/api/messages/${activePhone}`);
                const messages = await res.json();
                const box = document.getElementById('chatBox');
                box.innerHTML = '';
                
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'msg ' + msg.direction;
                    let content = msg.message_body || '';
                    if (msg.media_type === 'image') content = `<img src="/api/media/${msg.media_id}" alt="Graphic"> <br> ${content}`;
                    else if (msg.media_type === 'document') content = `<div>📄 <a href="/api/media/${msg.media_id}" target="_blank" style="color: #1E7C98; text-decoration: underline;">Download Document</a></div> <br> ${content}`;
                    
                    let senderInfo = msg.direction === 'outgoing' ? `<div style="font-size: 0.7rem; color: #888; text-align: right;">Sent by: ${msg.staff_username || 'System'}</div>` : '';
                    div.innerHTML = `${content} ${senderInfo}`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            } catch (error) { console.error(error); }
        }

        // SEND MESSAGE
        async function sendMessage() {
            const text = document.getElementById('msgInput').value.trim();
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if(!activePhone) return;
            if(!text && !file) return alert("Type a message or attach a file.");

            document.getElementById('msgInput').value = 'Sending...';
            const formData = new FormData();
            formData.append('to', activePhone);
            formData.append('message', text);
            formData.append('staff_username', currentStaff);
            if (file) formData.append('file', file);

            await fetch('/send-reply', { method: 'POST', body: formData });
            document.getElementById('msgInput').value = '';
            fileInput.value = '';
            loadMessages();
        }

        // Auto-refresh the Lobby and Active Chat
        setInterval(() => {
            if (document.getElementById('dashboardScreen').style.display === 'flex') {
                loadLobby();
                if (activePhone) loadMessages();
            }
        }, 4000);
    </script>
</body>
</html>
