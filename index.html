<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akhanet Team Workspace</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background-color: #f0f2f5; }
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .header { background: #1E7C98; color: white; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 8px; max-width: 60%; line-height: 1.4; font-size: 0.95rem; }
        .msg.incoming { background: white; align-self: flex-start; border: 1px solid #e0e0e0; border-top-left-radius: 0; }
        .msg.outgoing { background: #1E7C98; color: white; align-self: flex-end; border-top-right-radius: 0; }
        .msg-phone { font-size: 0.75rem; color: #888; margin-bottom: 4px; display: block; }
        .msg.outgoing .msg-phone { color: #d0e8f0; }
        .input-area { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; font-size: 1rem; }
        .phone-input { width: 180px; }
        button { background: #1E7C98; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #165c71; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="header">Akhanet Live Inbox</div>
        <div style="padding: 20px; color: #555; font-size: 0.9rem; text-align: center;">
            All incoming customer messages appear here. Enter the customer's phone number below to reply to them directly.
        </div>
    </div>
    <div class="chat-area">
        <div class="messages" id="chatBox">
            </div>
        <div class="input-area">
            <input type="text" id="phoneInput" class="phone-input" placeholder="To: e.g. 23480...">
            <input type="file" id="fileInput" style="display: none;">
            <button onclick="document.getElementById('fileInput').click()" style="background: #e0e0e0; color: #333; padding: 12px; border-radius: 6px;">📎 Attach</button>
            <input type="text" id="msgInput" placeholder="Type your reply or caption...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Automatically pull new messages from the database
        async function loadMessages() {
            try {
                const res = await fetch('/api/messages');
                const messages = await res.json();
                const box = document.getElementById('chatBox');
                box.innerHTML = '';
                
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'msg ' + msg.direction;
                    
                    let content = msg.message_body || '';
                    
                    // Format media correctly if it exists
                    if (msg.media_type === 'image') {
                        // Styled to guarantee graphics appear fully without being cut off
                        content = `<img src="/api/media/${msg.media_id}" style="max-width: 100%; max-height: 350px; object-fit: contain; display: block; border-radius: 4px; margin-top: 8px;" alt="Customer Graphic">`;
                    } else if (msg.media_type === 'document') {
                        // Dynamic color link so it's readable on both incoming (white) and outgoing (blue) bubbles
                        const linkColor = msg.direction === 'outgoing' ? '#ffffff' : '#1E7C98';
                        content = `<div style="margin-top: 8px;"><a href="/api/media/${msg.media_id}" target="_blank" style="color: ${linkColor}; text-decoration: underline; font-weight: bold;">📄 Download ${content}</a></div>`;
                    }
                    
                    div.innerHTML = `<span class="msg-phone">${msg.sender_phone}</span>${content}`;
                    box.appendChild(div);
                });
                
                // Auto-scroll to the newest message at the bottom
                box.scrollTop = box.scrollHeight;
            } catch (error) {
                console.error("Error loading messages", error);
            }
        }

        // Send the typed reply out to Meta
        async function sendMessage() {
            const phone = document.getElementById('phoneInput').value.trim();
            const text = document.getElementById('msgInput').value.trim();
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if(!text && !file) return alert("Please enter a message or attach a file.");
            if(!phone) return alert("Please enter the customer's phone number.");

            document.getElementById('msgInput').value = 'Sending...';

            const formData = new FormData();
            formData.append('to', phone);
            formData.append('message', text);
            if (file) formData.append('file', file);

            await fetch('/send-reply', {
                method: 'POST',
                body: formData // No content-type header needed, the browser sets it for FormData
            });

            document.getElementById('msgInput').value = '';
            fileInput.value = ''; // Clear the file selection
            loadMessages();
        }
    </script>
</body>
</html>
