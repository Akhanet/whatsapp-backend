<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akhanet Business Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>Akhanet Portal</h2>
            <div id="loginError" class="error-msg">Incorrect credentials.</div>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="passcode" placeholder="Passcode">
            <button onclick="attemptLogin()">Log In to Workspace</button>
        </div>
    </div>

    <div id="dashboardScreen">
        <div id="adminAlertBanner">
            <span id="alertText">🚨 SECURITY BREACH DETECTED</span>
            <button class="dismiss-btn" onclick="clearAlert()">Dismiss</button>
        </div>

        <div class="workspace-area">
            <div class="sidebar">
                <div class="header">
                    <div>
                        <div style="font-weight: bold; font-size: 1.1rem;">Active Lobby</div>
                        <div id="loggedInUser" class="user-info"></div>
                        <button id="adminBtn" class="admin-btn" onclick="openAdminPanel()">👑 Admin Tools</button>
                    </div>
                    <button class="logout-btn" onclick="logout()">Log Out</button>
                </div>
                <div class="customer-list" id="lobbyList"></div>
            </div>

            <div class="main-content">
                <div id="adminPanel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: var(--primary);">👑 Admin Tools</h2>
                        <button onclick="closeAdminPanel()" style="padding: 8px 16px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer;">Close Panel</button>
                    </div>
                    <div class="admin-tabs">
                        <button id="tabPayroll" class="tab-btn active" onclick="loadPayroll()">📊 Payroll</button>
                        <button id="tabArchive" class="tab-btn" onclick="loadArchive()">📁 Chat Archive</button>
                        <button id="tabSecurity" class="tab-btn" onclick="loadSecurityLog()">🚨 Security Log</button>
                    </div>
                    <div id="adminContent"></div>
                </div>

                <div id="lockOverlay">Select a customer from the lobby.</div>
                
                <div class="chat-header" id="chatHeader" style="display: none;">
                    <div class="chat-title">
                        <span id="activeChatTitle">Chat</span>
                        <button class="edit-name-btn" onclick="editCustomerName()" title="Edit Contact Name">✏️</button>
                    </div>
                    <div id="chatControls"></div>
                </div>
                
                <div class="messages" id="chatBox"></div>
                
                <div class="input-area" id="inputArea" style="display: none;">
                    <input type="file" id="fileInput" style="display: none;" onchange="updateFileInputUI()">
                    <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach File">📎</button>
                    
                    <select id="quickReplies" class="quick-reply-select" onchange="insertQuickReply()">
                        <option value="">⚡ Replies</option>
                        <option value="To process your CAC Registration, we require:&#10;1. Two proposed business names.&#10;2. Your full name, address, and email.&#10;3. A clear picture of your valid ID.&#10;4. A passport photograph.&#10;&#10;Let me know when you have these ready!">CAC Requirements</option>
                        <option value="NIN Reprinting costs ₦1,500. Please provide your NIN number or the phone number you used during registration.">NIN Pricing</option>
                        <option value="To check your academic results, please provide:&#10;1. Your Examination Number&#10;2. The Exam Year&#10;3. The Pin/Serial Number of your scratch card.">Result Checking</option>
                        <option value="Please make your payment to our official account:&#10;&#10;Bank: Zenith Bank&#10;Acct Name: Akhanet Computer Business Centre&#10;Acct Number: [INSERT NUMBER HERE]&#10;&#10;Kindly send a screenshot of the receipt once done!">Bank Details</option>
                        <option value="Your job is ready for pickup or download! Let us know if you need any other assistance.">Job Completed</option>
                    </select>

                    <input type="text" id="msgInput" placeholder="Type a message...">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
