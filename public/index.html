<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akhanet Business Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>Akhanet Portal</h2>
            <div id="loginError" class="error-msg">Incorrect credentials.</div>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="passcode" placeholder="Passcode">
            <button onclick="attemptLogin()">Log In to Workspace</button>
        </div>
    </div>

    <div id="dashboardScreen">
        <div id="adminAlertBanner">
            <span id="alertText">🚨 SECURITY BREACH DETECTED</span>
            <button class="dismiss-btn" onclick="clearAlert()">Dismiss</button>
        </div>

        <div class="workspace-area">
            <div class="sidebar">
                <div class="header">
                    <div>
                        <div style="font-weight: bold; font-size: 1.1rem;">Active Lobby</div>
                        <div id="loggedInUser" class="user-info"></div>
                        <button id="adminBtn" class="admin-btn" onclick="openAdminPanel()">👑 Admin Tools</button>
                    </div>
                    <button class="logout-btn" onclick="logout()">Log Out</button>
                </div>
                <div class="customer-list" id="lobbyList"></div>
            </div>

            <div class="main-content">
                <div id="adminPanel">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="color: var(--primary);">👑 Admin Tools</h2>
                        <button onclick="closeAdminPanel()" style="padding: 8px 16px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer;">Close Panel</button>
                    </div>
                    <div class="admin-tabs">
                        <button id="tabPayroll" class="tab-btn active" onclick="loadPayroll()">📊 Payroll</button>
                        <button id="tabArchive" class="tab-btn" onclick="loadArchive()">📁 Chat Archive</button>
                        <button id="tabSecurity" class="tab-btn" onclick="loadSecurityLog()">🚨 Security Log</button>
                    </div>
                    <div id="adminContent"></div>
                </div>

                <div id="lockOverlay">Select a customer from the lobby.</div>
                
                <div class="chat-header" id="chatHeader" style="display: none;">
                    <div class="chat-title">
                        <button id="mobileBackBtn" class="mobile-back-btn" onclick="closeMobileChat()">🔙</button>
                        <span id="activeChatTitle">Chat</span>
                        <button class="edit-name-btn" onclick="editCustomerName()" title="Edit Contact Name">✏️</button>
                    </div>
                    <div id="chatControls" style="display: flex; gap: 10px; align-items: center;"></div>
                </div>
                
                <div class="messages" id="chatBox"></div>
                
                <div class="input-area" id="inputArea" style="display: none;">
                    <input type="file" id="fileInput" style="display: none;" onchange="updateFileInputUI()">
                    <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach File">📎</button>
                    
                    <select id="quickReplies" class="quick-reply-select" onchange="insertQuickReply()">
                        <option value="">⚡Quick Reply</option>
                        <option value="To process your CAC Registration, we require:&#10;1. Two proposed business names.&#10;2. Your full name, address, and email.&#10;3. A clear picture of your valid ID.&#10;4. A passport photograph.&#10;&#10;Let me know when you have these ready!">CAC Requirements</option>
                        <option value="NIN Reprinting costs ₦1,500. Please provide your NIN number or the phone number you used during registration.">NIN Pricing</option>
                        <option value="To check your academic results, please provide:&#10;1. Your Examination Number&#10;2. The Exam Year&#10;3. The Pin/Serial Number of your scratch card.">Result Checking</option>
                        <option value="Please make your payment to our official account:&#10;&#10;Bank: Zenith Bank&#10;Acct Name: Akhanet Computer Business Centre&#10;Acct Number: [INSERT NUMBER HERE]&#10;&#10;Kindly send a screenshot of the receipt once done!">Bank Details</option>
                        <option value="Your job is ready for pickup or download! Let us know if you need any other assistance.">Job Completed</option>
                        <option value="_*NYSC Online registration is just as simple as filling a normal REGISTRATION form.*_&#10;&#10;*NYSC Registration Form Sample*&#10;1. Jamb Reg number&#10;2. Matric No&#10;3. First Name&#10;4. Middle name&#10;5. Surname&#10;6. Date of Birth&#10;7. Place of Birth&#10;8. Gender&#10;9. Marital Status&#10;10. Blood group&#10;11. Genotype&#10;12. Signature&#10;13. E-mail address&#10;14. States you wish to serve&#10;15. Already Have a Previous Call-up?: Yes or No&#10;16. Passport(1 white background)&#10;17. Physically Challenged?: Yes or No&#10;18. Nationality&#10;19. State of origin&#10;20. Local Government Area&#10;21. Present contact Address&#10;22. Permanent Address&#10;23. Town/ village&#10;24. NIN&#10;&#10;*NEXT OF KIN DATA*&#10;NEXT OF KIN(1)&#10;1. Name&#10;2. Relationship&#10;3. GSM number&#10;4. Address&#10;5. Town&#10;6. State&#10;&#10;NEXT OF KIN(2)&#10;1. Name&#10;2. Relationship&#10;3. GSM number&#10;4. Address&#10;5. Town&#10;6. State&#10;&#10;*INSTITUTIONS ATTENDED*&#10;Primary school details&#10;1. From&#10;2. To&#10;3. Award&#10;4. Date of graduation&#10;&#10;Secondary school details_&#10;1. From&#10;2. To&#10;3. Award&#10;4. Date of Graduation&#10;&#10;HIGHER INSTITUTION DETAILS&#10;1. Institution&#10;2. From&#10;3. To&#10;4. Course&#10;5. Award&#10;&#10;*MILITARY PERSONNEL?*&#10;&#10;*PARAMILITARY?*&#10;&#10;*NATIONAL AWARD HONOUR*&#10;1. Are you a serving member of Nigerian?&#10;&#10;2. Armed Force (NAF, NA, or NAVY) and served for minimum of 9 months?: Yes or No&#10;&#10;3. Are you a serving member of National Intelligence?: Yes or No&#10;&#10;4. Agency (NIA)? Yes No&#10;&#10;5. Are you a serving member of Nigerian Police Force (NPF)?: Yes or No.&#10;&#10;6. Are you a National Awardee?: Yes or No&#10;&#10;7. Nigerian Language(s) you speak&#10;&#10;Nigerian State(s)&#10;visited:____&#10;&#10;*KITS SPECIFICATION S/N SIZE LENGTH CHEST NECK*&#10;&#10;—❌❌❌ *SCAM: NYSC WILL STILL GIVE YOU BIG AMAZING OVERSIZE KHAKI IN CAMP* ❌❌❌ 🥹—&#10;&#10;1 Small 30-32 32-35 12-14&#10;2 Medium 32-33 36-38 14-15&#10;3 Large 35-36 38-40 15-16&#10;4 X-Large 36-38 40-42 16-17&#10;5. XXLarge 38-40 44-46 18-20&#10;&#10;S/N SIZE LENGTH CHEST NECK&#10;1 Small 40-41 28-32 18-20&#10;2 Medium 41-42 34-36 20-21&#10;3 Large 42-43 36-38 21-22&#10;4 X-Large 43-44 38-38 22-23&#10;&#10;*NOTE: Selection of States Is No Longer AVAILABLE*">NYSC Details</option>
                    </select>

                    <input type="text" id="msgInput" placeholder="Type a message...">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
